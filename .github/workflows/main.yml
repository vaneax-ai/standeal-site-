name: Deploy to Server

on:
  push:
    branches:
      - main   # rulează doar când faci push pe main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/vhosts/standeal.md/stan2-main
            git pull origin main

            cd frontend
            npm install
            npm run build

            sudo supervisorctl restart backend
